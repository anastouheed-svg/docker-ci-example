name: CI with Docker

on:
  push:
    branches: [ "main" ]

jobs:
  docker-test:
    runs-on: ubuntu-latest # GitHub ka Linux server (Runner)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Repo ka code fetch karna

      - name: Build Docker Image
        run: docker build -t my-ci-app . # Image build karna

      - name: Run Tests in Docker
        run: docker run my-ci-app # Container run karna (npm test chalayega)
